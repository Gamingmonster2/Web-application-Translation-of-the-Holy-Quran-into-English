<!DOCTYPE html>
<!-- تحديد لغة الموقع للإنجليزية واتجاه النص من اليسار لليمين -->
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fdfbf7">

    <!-- معلومات تحسين محركات البحث (SEO) للمحتوى الإنجليزي -->
    <title>The Holy Quran English Translation</title>
    <meta name="description" content="Read The Holy Quran with English translation. A modern, responsive, and easy-to-read digital Quran experience with multiple reading modes (Light, Sepia, Dark).">
    <meta name="keywords" content="Quran, English Translation, The Holy Quran, Islam, Read Quran online, digital Quran, English meaning">
    <meta name="author" content="Quran Team">
    
    <!-- إعدادات تطبيقات الهاتف (Mobile App Meta) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="English Quran">
    <!-- تغيير أيقونة الموقع (Favicon) لتناسب النسخة الجديدة -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕋</text></svg>">

    <!-- البيانات المنظمة (Structured Data) لمحركات البحث -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Holy Quran English Translation",
      "url": "https://www.yourwebsite.com",
      "description": "Modern digital Quran with English translation and multiple reading themes."
    }
    </script>

    <!-- استدعاء مكتبة Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- استدعاء خطوط جوجل (تم تغييرها لتناسب اللغة الإنجليزية) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* إعدادات الخطوط الأساسية والانتقالات السلسة للألوان */
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .quran-title-font {
            font-family: 'Merriweather', serif;
        }

        /* --- إعدادات الأوضاع (Themes Logic) --- */
        
        /* خصائص الصور المشتركة */
        .quran-page-img {
            transition: filter 0.5s ease, mix-blend-mode 0.5s ease, opacity 0.5s ease;
            display: block;
            width: 100%;
            height: auto;
        }

        /* 1. الوضع الفاتح (Light Mode) - الافتراضي */
        body.theme-light {
            background-color: #fdfbf7;
            color: #1f2937;
        }
        body.theme-light .quran-page-img {
            mix-blend-mode: multiply; /* دمج الصورة لإزالة الخلفية البيضاء إن وجدت */
            filter: contrast(1.05);
        }
        body.theme-light header {
            background-color: #ffffff;
            border-bottom-color: #f3f4f6;
        }

        /* 2. الوضع الورقي (Sepia Mode) - مريح للعين */
        body.theme-sepia {
            background-color: #f2e8d5;
            color: #5c4b37;
        }
        body.theme-sepia .quran-page-img {
            mix-blend-mode: multiply;
            filter: sepia(0.25) contrast(1.1) brightness(0.95);
        }
        body.theme-sepia header {
            background-color: #eaddcf;
            border-bottom-color: #dcbfa3;
        }

        /* 3. الوضع الليلي (Dark Mode) */
        body.theme-dark {
            background-color: #111827;
            color: #e5e7eb;
        }
        body.theme-dark .quran-page-img {
            /* قلب ألوان الصورة لتناسب الوضع الليلي (الأبيض يصبح أسود والعكس) */
            filter: invert(1) brightness(0.85) contrast(0.9);
            mix-blend-mode: screen; 
        }
        body.theme-dark header {
            background-color: #1f2937;
            border-bottom-color: #374151;
        }
        body.theme-dark .floating-bar {
            background-color: rgba(31, 41, 55, 0.95);
            border-color: #374151;
        }

        /* تصميم شريط التمرير (Scrollbar) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
        body.theme-dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        
        /* كلاسات لإخفاء وإظهار القائمة المنسدلة */
        .hidden-menu {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
        }
        .visible-menu {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>
<body class="theme-light min-h-screen flex flex-col items-center pb-32">

    <!-- الجزء العلوي (Header) -->

                        <p class="text-xs text-gray-400 dark:text-gray-500 mb-2 font-bold px-1 uppercase tracking-wider">Reading Mode</p>
                        <div class="flex flex-col gap-1">

                            <button onclick="changeTheme('light')" class="flex items-center gap-3 w-full px-3 py-2 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 transition-colors">
                                <span class="w-4 h-4 rounded-full border border-gray-300 bg-white"></span>
                                <span>Light Mode</span>
                            </button>
                            <!-- زر الوضع الورقي -->
                            <button onclick="changeTheme('sepia')" class="flex items-center gap-3 w-full px-3 py-2 text-sm rounded-lg hover:bg-[#eaddcf] text-[#5c4b37] transition-colors">
                                <span class="w-4 h-4 rounded-full border border-[#c4a484] bg-[#f2e8d5]"></span>
                                <span>Sepia Mode</span>
                            </button>
                            <!-- زر الوضع الليلي -->
                            <button onclick="changeTheme('dark')" class="flex items-center gap-3 w-full px-3 py-2 text-sm rounded-lg hover:bg-gray-700 hover:text-white text-gray-700 dark:text-gray-200 transition-colors">

                                <span>Dark Mode</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="h-20 w-full"></div>

    <!-- المحتوى الرئيسي: حاوية الصور -->

        <div id="loader" class="text-emerald-600 font-medium animate-pulse mt-10">Loading Quran pages...</div>
    </main>

    <!-- الشريط العائم في الأسفل للتنقل بين الصفحات -->
    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-30 w-[90%] max-w-md">

            <!-- زر الصفحة السابقة (تم عكس الأسهم لتناسب LTR) -->
            <button onclick="scrollToPrev()" class="p-2 hover:bg-white/20 rounded-full transition focus:outline-none" title="Previous Page">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <!-- مؤشر رقم الصفحة -->
            <div class="text-center">
                <span class="block text-[10px] text-emerald-200/80 uppercase tracking-widest">Page</span>
                <span id="page-number" class="text-xl font-bold font-mono leading-none">--</span>
            </div>

            <!-- زر الصفحة التالية (تم عكس الأسهم لتناسب LTR) -->
            <button onclick="scrollToNext()" class="p-2 hover:bg-white/20 rounded-full transition focus:outline-none" title="Next Page">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

        ];

        /* ---------------- منطق إدارة الأوضاع (Themes Logic) ---------------- */
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        let isMenuOpen = false;

        // فتح/إغلاق قائمة الإعدادات
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                settingsMenu.classList.remove('hidden-menu');
                settingsMenu.classList.add('visible-menu');
            } else {
                settingsMenu.classList.add('hidden-menu');
                settingsMenu.classList.remove('visible-menu');
            }
        });

        // إغلاق القائمة عند النقر في أي مكان خارجها
        document.addEventListener('click', (e) => {
            if (isMenuOpen && !settingsMenu.contains(e.target) && !settingsBtn.contains(e.target)) {
                isMenuOpen = false;
                settingsMenu.classList.add('hidden-menu');
                settingsMenu.classList.remove('visible-menu');
            }
        });

        // دالة تغيير الثيم
        function changeTheme(theme) {
            // إزالة جميع الكلاسات الخاصة بالأوضاع
            document.body.classList.remove('theme-light', 'theme-sepia', 'theme-dark');
            // إضافة كلاس الوضع المختار
            document.body.classList.add(`theme-${theme}`);
            
            // حفظ اختيار المستخدم في المتصفح (LocalStorage)
            localStorage.setItem('english-quran-theme', theme);

            // إغلاق القائمة بعد الاختيار
            isMenuOpen = false;
            settingsMenu.classList.add('hidden-menu');
            settingsMenu.classList.remove('visible-menu');
        }

        // استرجاع الثيم المحفوظ عند إعادة تحميل الصفحة
        const savedTheme = localStorage.getItem('english-quran-theme');
        if (savedTheme) {
            changeTheme(savedTheme);
        }

        /* ---------------- منطق تحميل وعرض الصور ---------------- */
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('quran-container');
            const loader = document.getElementById('loader');
            const pageNumberDisplay = document.getElementById('page-number');

            // إزالة الروابط المكررة إن وجدت
            const uniqueImages = [...new Set(rawImages)];
            
            // دالة لاستخراج رقم الصفحة من الرابط لترتيبها بشكل صحيح
            const getPageNumber = (url) => {
                const match = url.match(/(\d+)(?=\.(png|jpg|jpeg|webp))/i);
                return match ? parseInt(match[0], 10) : 9999;
            };

            // ترتيب الصور بناءً على الرقم المستخرج
            const sortedImages = uniqueImages.sort((a, b) => getPageNumber(a) - getPageNumber(b));

            // إخفاء نص التحميل
            if(loader) loader.remove();

            // رسالة تنبيه في حال عدم وجود روابط
            if (sortedImages.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-gray-500 border-2 border-dashed border-gray-300 rounded-lg">Please add image links in the source code (Array: rawImages)</div>';
                return;
            }

            // بناء عناصر الصور داخل الـ HTML
            sortedImages.forEach((url, index) => {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'w-full relative min-h-[400px] flex items-center justify-center mb-1';
                
                const img = document.createElement('img');
                img.src = url;
                img.alt = `Page ${getPageNumber(url)}`; // نص بديل بالإنجليزية
                img.loading = "lazy"; // تحميل كسول لتسريع الموقع
                
                // كلاس quran-page-img ضروري لتطبيق فلاتر الألوان (الوضع الليلي والورقي)
                img.className = 'quran-page-img opacity-0'; 
                
                img.id = `quran-page-${index}`;
                img.setAttribute('data-index', index);
                img.setAttribute('data-real-page', getPageNumber(url));

                // إظهار الصورة بسلاسة بعد تحميلها
                img.onload = () => img.classList.remove('opacity-0');
                // رسالة خطأ في حال فشل تحميل صورة معينة
                img.onerror = () => {
                    imgContainer.innerHTML = `<div class="text-xs text-red-400">Error loading page: ${getPageNumber(url)}</div>`;
                };

                imgContainer.appendChild(img);
                container.appendChild(imgContainer);
            });

            // مراقب التمرير (IntersectionObserver) لتحديث رقم الصفحة في الشريط العائم
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const realPage = entry.target.getAttribute('data-real-page');
                        const index = entry.target.getAttribute('data-index');
                        pageNumberDisplay.textContent = realPage;
                        window.currentIndex = parseInt(index);
                    }
                });
            }, { threshold: 0.5 }); // التحديث عندما تظهر 50% من الصورة

            // تطبيق المراقب على جميع الصور
            document.querySelectorAll('#quran-container img').forEach(img => observer.observe(img));

            // تهيئة رقم الصفحة الأولى عند فتح الموقع
            if(sortedImages.length > 0) {
                pageNumberDisplay.textContent = getPageNumber(sortedImages[0]);
                window.currentIndex = 0;
            }
        });

        /* ---------------- دوال أزرار التنقل (التالي / السابق) ---------------- */
        window.currentIndex = 0;
        
        function scrollToNext() {
            const nextIndex = window.currentIndex + 1;
            const target = document.getElementById(`quran-page-${nextIndex}`);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function scrollToPrev() {
            const prevIndex = window.currentIndex - 1;
            const target = document.getElementById(`quran-page-${prevIndex}`);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
